<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  button {
    width: 100%; height: 38px;
    background: #555; color: white;
    border: none; border-radius: 6px;
    font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background .15s;
  }
  button:hover { background: #333; }
  button.ok  { background: #0e7c44; }
  button.err { background: #b33; }
</style>
</head>
<body>
<button id="btn" onclick="doPaste()">📋 Paste image</button>
<script>
// Minimal inline Streamlit component protocol — no CDN needed
function sendMsg(type, payload) {
  window.parent.postMessage(Object.assign({ type }, payload), '*');
}

// 1. Tell Streamlit we're ready
sendMsg('streamlit:componentReady', { apiVersion: 1 });

// 2. Set iframe height
function setHeight() {
  sendMsg('streamlit:setFrameHeight', { height: document.body.scrollHeight });
}
setHeight();
window.addEventListener('load', setHeight);

// 3. Handle paste
async function doPaste() {
  const btn = document.getElementById('btn');
  try {
    const items = await navigator.clipboard.read();
    for (const item of items) {
      for (const type of item.types) {
        if (type.startsWith('image/')) {
          const blob = await item.getType(type);
          const reader = new FileReader();
          reader.onload = e => {
            const b64 = e.target.result.split(',')[1];
            // 4. Return value to Python
            sendMsg('streamlit:setComponentValue', { value: b64, dataType: 'json' });
            btn.textContent = '✅ Pasted!';
            btn.className = 'ok';
            setTimeout(() => { btn.textContent = '📋 Paste image'; btn.className = ''; }, 2000);
          };
          reader.readAsDataURL(blob);
          return;
        }
      }
    }
    btn.textContent = '⚠️ No image in clipboard';
    btn.className = 'err';
    setTimeout(() => { btn.textContent = '📋 Paste image'; btn.className = ''; }, 2000);
  } catch(e) {
    btn.textContent = '⚠️ Clipboard access denied';
    btn.className = 'err';
    setTimeout(() => { btn.textContent = '📋 Paste image'; btn.className = ''; }, 2500);
  }
}
</script>
</body>
</html>
